<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CITY CHAOS RACER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap');
:root{--y:#F5C400;--o:#FF5500;--r:#FF1111;--b:#00CCFF;--pb:#2255FF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Barlow Condensed',sans-serif;}
#wrap{position:relative;width:100vw;height:100vh;}
canvas{display:block;}

/* HUD */
#hud{position:absolute;top:0;left:0;right:0;display:none;padding:14px 20px;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:40;}
.hp{background:rgba(6,6,12,.85);border:1px solid rgba(245,196,0,.22);padding:8px 16px 10px;}
.hl{color:#555;font-size:10px;letter-spacing:3px;text-transform:uppercase;}
.hv{font-family:'Bebas Neue',cursive;font-size:38px;color:var(--y);line-height:1;}
.hv.sm{font-size:22px;color:var(--b);}
#boostBar{height:9px;background:#111;border:1px solid #222;margin-top:5px;overflow:hidden;}
#boostFill{height:100%;background:linear-gradient(90deg,var(--o),var(--y));transition:width .06s;}
#boostFill.lit{animation:blit .2s infinite alternate;}
@keyframes blit{from{box-shadow:0 0 6px var(--o);}to{box-shadow:0 0 20px var(--y),0 0 36px var(--o);}}
#stars{display:flex;gap:3px;margin-top:5px;}
.st{font-size:15px;color:#252525;transition:color .15s,filter .15s;}
.st.on{color:var(--pb);filter:drop-shadow(0 0 5px var(--pb));}

/* COMBO */
#combo{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);font-family:'Bebas Neue',cursive;font-size:clamp(26px,5vw,60px);color:var(--y);pointer-events:none;opacity:0;z-index:60;text-align:center;white-space:nowrap;text-shadow:0 0 24px var(--o),2px 2px 0 #000;}
#combo.pop{animation:cpop .75s forwards;}
@keyframes cpop{0%{opacity:1;transform:translate(-50%,-50%) scale(.5);}40%{opacity:1;transform:translate(-50%,-70%) scale(1.2);}100%{opacity:0;transform:translate(-50%,-110%) scale(.85);}}

/* SPEED LINES */
#speedLines{position:absolute;inset:0;pointer-events:none;z-index:32;opacity:0;transition:opacity .15s;}

/* ── TITLE ── */
#title{position:absolute;inset:0;background:#090910;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;overflow:hidden;}
.troad{position:absolute;bottom:0;left:0;right:0;height:60%;overflow:hidden;}
.troad-inner{position:absolute;inset:0;background:linear-gradient(180deg,#0d0f14 0%,#1a1d26 100%);}
/* Lane lines animated */
.troad::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:5px;margin-left:-2.5px;background:repeating-linear-gradient(180deg,var(--y) 0,var(--y) 22px,transparent 22px,transparent 55px);opacity:.5;animation:scrollLines 1s linear infinite;}
@keyframes scrollLines{from{background-position:0 0;}to{background-position:0 77px;}}
.th1{font-family:'Bebas Neue',cursive;font-size:clamp(52px,10vw,112px);color:var(--y);letter-spacing:5px;text-shadow:7px 0 0 var(--r),-7px 0 0 var(--b);animation:tg 3.5s infinite;text-align:center;line-height:.93;position:relative;z-index:2;}
@keyframes tg{0%,88%,100%{text-shadow:7px 0 0 var(--r),-7px 0 0 var(--b);}89%{text-shadow:-9px 0 0 var(--r),9px 0 0 var(--b);transform:translateX(4px);}91%{text-shadow:9px 0 0 var(--r),-9px 0 0 var(--b);transform:translateX(-4px);}93%{text-shadow:7px 0 0 var(--r),-7px 0 0 var(--b);transform:none;}}
.tsub{font-size:clamp(13px,2.2vw,20px);color:var(--o);letter-spacing:10px;text-transform:uppercase;margin-top:8px;position:relative;z-index:2;}
.tbtn{margin-top:50px;padding:17px 70px;font-family:'Bebas Neue',cursive;font-size:clamp(20px,3vw,28px);letter-spacing:5px;background:var(--y);color:#000;border:none;cursor:pointer;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);animation:tp 2s infinite;position:relative;z-index:2;transition:transform .1s;}
.tbtn:hover{transform:scale(1.05);}.tbtn:active{transform:scale(.96);}
@keyframes tp{0%,100%{box-shadow:0 0 20px var(--y);}50%{box-shadow:0 0 55px var(--y),0 0 90px var(--o);}}
.tkeys{color:#444;font-size:13px;letter-spacing:2px;margin-top:22px;position:relative;z-index:2;text-align:center;line-height:1.9;}
.ctrl-toggle{display:flex;gap:0;margin-top:28px;position:relative;z-index:2;}
.ctrl-opt{padding:11px 36px;font-family:'Bebas Neue',cursive;font-size:clamp(15px,2.2vw,20px);letter-spacing:4px;border:2px solid #333;background:transparent;color:#444;cursor:pointer;transition:all .15s;}
.ctrl-opt:first-child{clip-path:polygon(8px 0%,100% 0%,100% 100%,0% 100%);border-right:none;}
.ctrl-opt:last-child{clip-path:polygon(0% 0%,calc(100% - 8px) 0%,100% 100%,0% 100%);border-left:none;}
.ctrl-opt.active{background:var(--y);color:#000;border-color:var(--y);box-shadow:0 0 18px rgba(245,196,0,.4);}
#mctrl{position:absolute;bottom:0;left:0;right:0;height:200px;display:none;z-index:50;pointer-events:none;padding:16px 24px;align-items:flex-end;justify-content:space-between;}
#mctrl.show{display:flex;}
.mc-group{display:flex;gap:10px;align-items:flex-end;pointer-events:all;}
.mc-btn{width:68px;height:68px;background:rgba(245,196,0,.12);border:2px solid rgba(245,196,0,.35);border-radius:14px;color:var(--y);font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;transition:background .08s,border-color .08s;}
.mc-btn:active,.mc-btn.held{background:rgba(245,196,0,.32);border-color:var(--y);box-shadow:0 0 14px rgba(245,196,0,.3);}
.mc-btn.boost{background:rgba(255,85,0,.15);border-color:rgba(255,85,0,.45);color:var(--o);width:80px;height:80px;font-size:30px;}
.mc-btn.boost.held{background:rgba(255,85,0,.35);border-color:var(--o);}

/* ── PAUSE ── */
#pause{position:absolute;inset:0;background:rgba(0,0,0,.8);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:90;backdrop-filter:blur(10px);}
#pause.show{display:flex;}
.pmh{font-family:'Bebas Neue',cursive;font-size:clamp(56px,9vw,100px);color:var(--y);letter-spacing:8px;text-shadow:0 0 35px var(--o);}
.pmline{width:280px;height:2px;background:linear-gradient(90deg,transparent,var(--y),transparent);margin:16px 0 20px;}
.pmstat{color:#999;font-size:clamp(14px,2vw,19px);letter-spacing:2px;line-height:2.1;text-align:center;}
.pmstat b{color:var(--y);}
.pmvol{display:flex;align-items:center;gap:12px;margin-top:18px;color:#666;font-size:13px;letter-spacing:2px;}
.pmvol input[type=range]{-webkit-appearance:none;width:150px;height:4px;background:#2a2a2a;border-radius:2px;outline:none;}
.pmvol input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;background:var(--y);border-radius:50%;cursor:pointer;}
.pmbtns{display:flex;gap:14px;margin-top:34px;flex-wrap:wrap;justify-content:center;}
.pmbtn{padding:13px 46px;font-family:'Bebas Neue',cursive;font-size:clamp(16px,2.5vw,22px);letter-spacing:4px;border:2px solid var(--y);background:transparent;color:var(--y);cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:all .15s;}
.pmbtn:hover{background:var(--y);color:#000;box-shadow:0 0 26px var(--y);}
.pmbtn.red{border-color:var(--r);color:var(--r);}.pmbtn.red:hover{background:var(--r);color:#fff;box-shadow:0 0 26px var(--r);}

/* ── GAME OVER ── */
#gameover{position:absolute;inset:0;background:rgba(0,0,0,.93);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:95;}
#gameover.show{display:flex;}
.goh{font-family:'Bebas Neue',cursive;font-size:clamp(60px,10vw,108px);letter-spacing:8px;}
.gopt{font-family:'Bebas Neue',cursive;font-size:clamp(28px,5vw,54px);color:var(--y);margin-top:10px;}
.gost{color:#777;font-size:clamp(13px,1.8vw,17px);letter-spacing:2px;margin-top:14px;text-align:center;line-height:2;}
.gost b{color:#ccc;}

/* ESC hint */
#esc{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);color:#383838;font-size:12px;letter-spacing:3px;z-index:40;pointer-events:none;display:none;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <canvas id="speedLines"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hp">
      <div class="hl">Score</div>
      <div class="hv" id="hScore">0</div>
      <div class="hl" style="margin-top:6px">Distance</div>
      <div class="hv sm" id="hDist">0 m</div>
    </div>
    <div class="hp" style="text-align:center">
      <div class="hl">Speed</div>
      <div class="hv" id="hSpeed" style="color:var(--b)">0</div>
      <div class="hl">mph</div>
    </div>
    <div class="hp">
      <div class="hl">Boost</div>
      <div id="boostBar"><div id="boostFill" style="width:0%"></div></div>
      <div class="hl" style="margin-top:8px">Wanted</div>
      <div id="stars">
        <span class="st" id="s1">★</span><span class="st" id="s2">★</span>
        <span class="st" id="s3">★</span><span class="st" id="s4">★</span>
        <span class="st" id="s5">★</span>
      </div>
    </div>
  </div>

  <div id="combo"></div>
  <div id="esc">ESC / P — PAUSE</div>

  <!-- TITLE -->
  <div id="title">
    <div class="troad"><div class="troad-inner"></div></div>
    <div class="th1">CITY CHAOS<br>RACER</div>
    <div class="tsub">Highway Mayhem</div>
    <div class="ctrl-toggle">
      <button class="ctrl-opt active" id="optPC">PC CONTROLS</button>
      <button class="ctrl-opt" id="optMobile">MOBILE CONTROLS</button>
    </div>
    <button class="tbtn" id="btnStart">FLOOR IT</button>
    <div class="tkeys" id="tkeys">← → / A D — Change Lane &nbsp;·&nbsp; SPACE — Boost<br>ESC / P — Pause &nbsp;·&nbsp; ↑↓ / W S — Speed</div>
  </div>

  <!-- MOBILE CONTROLS -->
  <div id="mctrl">
    <div class="mc-group">
      <div class="mc-btn" id="mcLeft">◀</div>
    </div>
    <div class="mc-group" style="flex-direction:column;align-items:center;gap:10px;">
      <div class="mc-btn" id="mcUp">▲</div>
      <div class="mc-btn boost" id="mcBoost">⚡</div>
      <div class="mc-btn" id="mcDown">▼</div>
    </div>
    <div class="mc-group">
      <div class="mc-btn" id="mcRight">▶</div>
    </div>
  </div>

  <!-- PAUSE -->
  <div id="pause">
    <div class="pmh">PAUSED</div>
    <div class="pmline"></div>
    <div class="pmstat" id="pmStat"></div>
    <div class="pmvol">
      <span>VOL</span>
      <input type="range" id="vol" min="0" max="100" value="70">
      <span id="volN">70%</span>
    </div>
    <div class="pmbtns">
      <button class="pmbtn" id="btnResume">RESUME</button>
      <button class="pmbtn red" id="btnQuit">QUIT</button>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="gameover">
    <div class="goh" id="goH">BUSTED!</div>
    <div class="gopt" id="goPt">0 PTS</div>
    <div class="gost" id="goSt"></div>
    <div class="pmbtns" style="margin-top:30px">
      <button class="pmbtn" id="btnRestart">RACE AGAIN</button>
      <button class="pmbtn red" id="btnMenu">MAIN MENU</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════
let AC, MG, volMult = 0.7;
let engOsc, engGain;

function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  MG = AC.createGain(); MG.gain.value = volMult; MG.connect(AC.destination);
}
function resumeAC() { if (AC && AC.state === 'suspended') AC.resume(); }

function startEngine() {
  if (!AC) return;
  if (engOsc) { try { engOsc.stop(); } catch(e) {} }
  engGain = AC.createGain(); engGain.gain.value = 0; engGain.connect(MG);
  const dist = AC.createWaveShaper();
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) { const x = (i*2/256)-1; curve[i] = (Math.PI+400)*x/(Math.PI+400*Math.abs(x)); }
  dist.curve = curve;
  engOsc = AC.createOscillator(); engOsc.type = 'sawtooth'; engOsc.frequency.value = 65;
  engOsc.connect(dist); dist.connect(engGain); engOsc.start();
}
function stopEngine() { if (!engOsc) return; try { engOsc.stop(); } catch(e) {} engOsc = null; engGain = null; }
function setRPM(speed, boost) {
  if (!engOsc || !engGain) return;
  engOsc.frequency.setTargetAtTime(65 + speed * 22 + (boost ? 140 : 0), AC.currentTime, 0.09);
  engGain.gain.setTargetAtTime(Math.min(0.22, 0.02 + speed * 0.022), AC.currentTime, 0.06);
}

function noiseBurst(dur, vol, decay = 0.35) {
  if (!AC) return;
  const buf = AC.createBuffer(1, AC.sampleRate * dur, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(d.length*decay));
  const s = AC.createBufferSource(); s.buffer = buf;
  const g = AC.createGain(); g.gain.value = vol;
  s.connect(g); g.connect(MG); s.start();
}

function tone(freq, dur, vol, type='sine', freqEnd) {
  if (!AC) return;
  const g = AC.createGain(); g.connect(MG);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
  const o = AC.createOscillator(); o.type = type;
  o.frequency.value = freq;
  if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, AC.currentTime + dur);
  o.connect(g); o.start(); o.stop(AC.currentTime + dur + 0.02);
}

function playBoom()   { tone(180,.4,.45,'sine',32); noiseBurst(.22,.38); }
function playTyre()   { tone(320+Math.random()*80,.18,.09,'sawtooth',110); }
function playBoost()  { tone(160,.6,.22,'sawtooth',750); }
function playSiren(i) { tone(680,.22,.05*i,'square'); setTimeout(()=>tone(920,.22,.05*i,'square'),220); }
function playLane()   { tone(800,.06,.05,'sine'); }
function playLap()    { [440,550,660,880].forEach((f,i)=>setTimeout(()=>tone(f,.25,.16,'triangle'),i*100)); }
function playBusted() { [320,200,130].forEach((f,i)=>setTimeout(()=>tone(f,.45,.22,'sawtooth'),i*200)); }
function playFinish() { [523,659,784,1047,784,1047,1319].forEach((f,i)=>setTimeout(()=>tone(f,.18,.18,'triangle'),i*80)); }
function playClick()  { tone(1100,.06,.09,'square'); }
function playNearMiss(){ tone(400,.08,.07,'sine',200); }
function playPoliceRam(){ tone(200,.3,.3,'sawtooth',50); noiseBurst(.3,.5); }

// ══════════════════════════════════════════
//  CANVAS
// ══════════════════════════════════════════
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let W, H;
function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);

// ══════════════════════════════════════════
//  HIGHWAY CONSTANTS
// ══════════════════════════════════════════
const NUM_LANES = 6;
const LANE_W = 90;
const ROAD_W = NUM_LANES * LANE_W;          // total road width
const SHOULDER = 60;                         // dirt/barrier each side
const TOTAL_W = ROAD_W + SHOULDER * 2;

// Lane centers (x) — road is centered on canvas
// We'll recompute relative to canvas center
function laneX(lane) { // lane 0..NUM_LANES-1
  const roadLeft = W / 2 - ROAD_W / 2;
  return roadLeft + lane * LANE_W + LANE_W / 2;
}

// ══════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════
let G = null;

function mkGame() {
  const g = {
    running: true, paused: false,
    score: 0, dist: 0,
    boost: 0, maxBoost: 100, boostActive: false,
    wanted: 0, sirenTimer: 0,
    destroyed: 0, combos: 0,
    comboChain: 0, comboTimer: 0,
    nearMissTimer: 0,
    scrollY: 0, bgScrollY: 0, roadMarkOffset: 0,
    car: {
      lane: Math.floor(NUM_LANES / 2),
      x: 0, y: 0,
      speed: 4,
      targetLane: Math.floor(NUM_LANES / 2),
      shifting: false,
      w: 30, h: 54, inv: 0,
    },
    traffic: [], trafficTimer: 0,
    police: [], policeTimer: 0,
    roadObj: [], roadObjTimer: 0,
    particles: [], sparks: [],
    skidLeft: [], skidRight: [],
    scenery: [],
    tyreTimer: 0,
    lapDist: 0,
    lapCount: 0,
    milestoneNext: 500,
  };
  // Pre-seed scenery spread across full screen height
  for (let i = 0; i < 22; i++) {
    const side = i % 2 === 0 ? 'left' : 'right';
    const roadLeft = W/2 - ROAD_W/2;
    const roadRight = W/2 + ROAD_W/2;
    const x = side === 'left' ? roadLeft - 20 - Math.random()*120 : roadRight + 20 + Math.random()*120;
    const type = SCENERY_TYPES[Math.floor(Math.random()*SCENERY_TYPES.length)];
    g.scenery.push({ x, y: Math.random() * H, type, side, alive: true });
  }
  return g;
}

// ══════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════
const K = {};
window.addEventListener('keydown', e => {
  K[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if ((e.code === 'Escape' || e.code === 'KeyP') && G && G.running) togglePause();
});
window.addEventListener('keyup', e => { K[e.code] = false; });

let laneKeyCD = 0;

function togglePause() {
  playClick();
  if (!G) return;
  G.paused = !G.paused;
  const el = document.getElementById('pause');
  if (G.paused) { el.classList.add('show'); updatePauseStat(); stopEngine(); }
  else { el.classList.remove('show'); startEngine(); resumeAC(); }
}
function updatePauseStat() {
  document.getElementById('pmStat').innerHTML =
    `Score: <b>${G.score.toLocaleString()}</b><br>` +
    `Distance: <b>${(G.dist|0)} m</b><br>` +
    `Destroyed: <b>${G.destroyed}</b><br>` +
    `Wanted: <b>${'★'.repeat(G.wanted) || '—'}</b>`;
}

// ══════════════════════════════════════════
//  SPAWNING
// ══════════════════════════════════════════
const TRAFFIC_TYPES = ['sedan','suv','truck','van','sports'];
const TRAFFIC_COLORS = ['#CC2200','#0033BB','#006622','#888888','#AA8800','#334455','#552200','#003344'];

function spawnTraffic(G) {
  const lane = Math.floor(Math.random() * NUM_LANES);
  const type = TRAFFIC_TYPES[Math.floor(Math.random() * TRAFFIC_TYPES.length)];
  const col = TRAFFIC_COLORS[Math.floor(Math.random() * TRAFFIC_COLORS.length)];
  const spd = 0.5 + Math.random() * (G.car.speed * 0.55); // slower than player
  G.traffic.push({
    lane, x: laneX(lane), y: -80,
    type, col, spd,
    w: type==='truck'?34:28, h: type==='truck'?80:type==='suv'?60:52,
    alive: true,
  });
}

function spawnRoadObj(G) {
  const lane = Math.floor(Math.random() * NUM_LANES);
  const types = ['barrel','cone','debris','crate'];
  const type = types[Math.floor(Math.random() * types.length)];
  G.roadObj.push({ lane, x: laneX(lane), y: -40, type, alive: true, w: 22, h: 22 });
}

function spawnPolice(G) {
  // Spawn from top, random lane
  const lane = Math.floor(Math.random() * NUM_LANES);
  G.police.push({
    lane, x: laneX(lane), y: -80,
    spd: G.car.speed * 1.3 + G.wanted * 0.4,
    w: 30, h: 54, siren: 0,
    targetLane: lane,
    laneCD: 0,
  });
}

const SCENERY_TYPES = ['tree','tree','tree','billboard','tree','light','bush','tree'];
function spawnScenery(G) {
  const side = Math.random() < 0.5 ? 'left' : 'right';
  const roadLeft = W/2 - ROAD_W/2;
  const roadRight = W/2 + ROAD_W/2;
  const x = side === 'left'
    ? roadLeft - 20 - Math.random() * 120
    : roadRight + 20 + Math.random() * 120;
  const type = SCENERY_TYPES[Math.floor(Math.random() * SCENERY_TYPES.length)];
  G.scenery.push({ x, y: -80, type, side, alive: true });
}

// ══════════════════════════════════════════
//  UPDATE
// ══════════════════════════════════════════
function update(dt) {
  const c = G.car;

  // Speed control
  const maxSp = G.boostActive ? 14 : 9;
  const minSp = 2;
  if (K['ArrowUp'] || K['KeyW']) c.speed = Math.min(c.speed + 0.08, maxSp);
  else if (K['ArrowDown'] || K['KeyS']) c.speed = Math.max(c.speed - 0.06, minSp);
  else c.speed += (5 - c.speed) * 0.015; // drift toward base speed

  // Lane change
  laneKeyCD = Math.max(0, laneKeyCD - 1);
  if (laneKeyCD === 0) {
    if ((K['ArrowLeft'] || K['KeyA']) && c.targetLane > 0) {
      c.targetLane--; laneKeyCD = 18; playLane();
    } else if ((K['ArrowRight'] || K['KeyD']) && c.targetLane < NUM_LANES - 1) {
      c.targetLane++; laneKeyCD = 18; playLane();
    }
  }
  c.x += (laneX(c.targetLane) - c.x) * 0.14;
  c.y = H * 0.74;

  // Boost
  if (K['Space'] && G.boost >= 18 && !G.boostActive) { G.boostActive = true; playBoost(); }
  if (G.boostActive) {
    G.boost -= 0.9;
    if (G.boost <= 0) { G.boost = 0; G.boostActive = false; }
    for (let i = 0; i < 2; i++) {
      G.sparks.push({ x: c.x + (Math.random()-0.5)*20, y: c.y + c.h/2,
        vx: (Math.random()-0.5)*4, vy: 4 + Math.random()*6,
        life: 0.7, col: Math.random()<0.5 ? '#FF5500':'#FFD700' });
    }
  }

  // Tyre squeal on fast lane change
  G.tyreTimer--;
  if (G.tyreTimer <= 0 && Math.abs(laneX(c.targetLane) - c.x) > 20) {
    playTyre(); G.tyreTimer = 14;
    // Skid marks
    G.skidLeft.push({ x: c.x - 8, y: c.y + c.h/2 - 5 });
    G.skidRight.push({ x: c.x + 8, y: c.y + c.h/2 - 5 });
    if (G.skidLeft.length > 100) G.skidLeft.shift();
    if (G.skidRight.length > 100) G.skidRight.shift();
  }

  setRPM(c.speed, G.boostActive);

  // Road scroll
  const scrollSpd = c.speed * 3.5;
  G.scrollY = (G.scrollY + scrollSpd) % (H * 2);
  G.roadMarkOffset = (G.roadMarkOffset + scrollSpd) % 80;
  G.bgScrollY = (G.bgScrollY + scrollSpd * 0.4) % H;
  G.dist += c.speed * 0.12;

  // Milestones → more challenge
  if (G.dist > G.milestoneNext) {
    G.milestoneNext += 500;
    G.lapCount++;
    playLap();
    flashMsg(`${(G.dist|0)}m — STEP IT UP!`, '#00CCFF');
    if (G.lapCount % 2 === 0) G.wanted = Math.min(5, G.wanted + 1);
  }

  // Scroll all entities
  const scrollAll = obj => { obj.y += scrollSpd; };

  // Traffic
  G.trafficTimer--;
  if (G.trafficTimer <= 0) {
    spawnTraffic(G);
    G.trafficTimer = Math.max(18, 55 - G.car.speed * 3 - G.dist * 0.01) | 0;
  }
  G.traffic.forEach(scrollAll);
  // Cull
  G.traffic = G.traffic.filter(t => t.y < H + 100);

  // Road objects
  G.roadObjTimer--;
  if (G.roadObjTimer <= 0) {
    spawnRoadObj(G);
    G.roadObjTimer = (60 + Math.random() * 80) | 0;
  }
  G.roadObj.forEach(scrollAll);
  G.roadObj = G.roadObj.filter(o => o.y < H + 60);

  // Police
  G.policeTimer--;
  if (G.policeTimer <= 0 && G.wanted >= 1) {
    const need = G.wanted;
    while (G.police.length < need) spawnPolice(G);
    G.policeTimer = 300;
  }
  // Police AI: chase player lane
  for (const p of G.police) {
    p.siren = (p.siren + 0.08) % (Math.PI * 2);
    // Gradually approach player
    p.y += scrollSpd * 0.55 + (p.spd * 0.5); // scroll + own approach
    // Steer toward player lane
    p.laneCD = Math.max(0, p.laneCD - 1);
    if (p.laneCD === 0 && Math.abs(p.lane - c.targetLane) > 0) {
      p.targetLane = p.targetLane === undefined ? p.lane : p.targetLane;
      p.targetLane += Math.sign(c.targetLane - p.lane);
      p.targetLane = Math.max(0, Math.min(NUM_LANES-1, p.targetLane));
      p.lane = p.targetLane;
      p.laneCD = 40 - G.wanted * 4;
    }
    p.x += (laneX(p.lane) - p.x) * 0.08;
  }
  G.police = G.police.filter(p => p.y < H + 100 && p.y > -200);

  // Siren
  if (G.wanted >= 1) {
    G.sirenTimer -= dt;
    if (G.sirenTimer <= 0) { playSiren(G.wanted / 5); G.sirenTimer = 90 - G.wanted * 12; }
  }

  // Scenery
  if (Math.random() < 0.04) spawnScenery(G);
  G.scenery.forEach(scrollAll);
  G.scenery = G.scenery.filter(s => s.y < H + 100);

  // Collisions
  checkCollisions();

  // Particles
  updateParticles(dt);

  c.inv = Math.max(0, c.inv - dt);
  G.nearMissTimer = Math.max(0, G.nearMissTimer - dt);
}

// ══════════════════════════════════════════
//  COLLISIONS
// ══════════════════════════════════════════
function checkCollisions() {
  const c = G.car;
  if (c.inv > 0) return;

  // Traffic
  for (const t of G.traffic) {
    if (!t.alive) continue;
    if (hitTest(c, t)) {
      smashVehicle(t);
      return;
    }
    // Near miss bonus
    if (G.nearMissTimer <= 0) {
      const dx = Math.abs(c.x - t.x);
      const dy = Math.abs(c.y - t.y);
      if (dx < c.w + 20 && dy < c.h + 30 && !(dx < c.w && dy < c.h)) {
        G.score += 25; G.nearMissTimer = 30;
        playNearMiss();
        flashMsg('NEAR MISS! +25', '#AAFFCC');
      }
    }
  }

  // Road objects
  for (const o of G.roadObj) {
    if (!o.alive) continue;
    if (hitTest(c, o)) { smashObject(o); }
  }

  // Police ram
  if (G.wanted >= 3) {
    for (const p of G.police) {
      if (hitTest(c, p)) { endGame(false); return; }
    }
  }
}

function hitTest(a, b) {
  return Math.abs(a.x - b.x) < (a.w + b.w) * 0.45 &&
         Math.abs(a.y - b.y) < (a.h + b.h) * 0.42;
}

const VEH_SCORES = { sedan:200, suv:280, truck:400, van:250, sports:350 };
const OBJ_SCORES = { barrel:80, cone:50, debris:60, crate:120 };

function smashVehicle(t) {
  t.alive = false;
  addSmash(t.x, t.y, t.col, VEH_SCORES[t.type] || 200);
  playBoom();
}

function smashObject(o) {
  o.alive = false;
  addSmash(o.x, o.y, '#888', OBJ_SCORES[o.type] || 60);
  playBoom();
}

function addSmash(x, y, baseCol, pts) {
  G.comboChain++; G.comboTimer = 75;
  const mult = G.comboChain, earned = pts * mult;
  G.score += earned; G.destroyed++;
  G.boost = Math.min(G.maxBoost, G.boost + 24);
  if (G.destroyed % 4 === 0) G.wanted = Math.min(5, G.wanted + 1);

  const cols = [baseCol, '#FF5500', '#FFD700', '#FFFF00', '#FF2200'];
  for (let i = 0; i < 24; i++) {
    const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 7;
    G.particles.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
      life: 1, col: cols[i % cols.length], sz: 3 + Math.random()*9 });
  }
  if (mult >= 2) {
    const L = ['NICE!','SMASH!!','WRECK!!!','CHAOS!!!!','LEGENDARY!!!!!'];
    flashMsg(`${L[Math.min(mult-2,4)]}  +${earned}`, null);
    G.combos++;
  }
}

// ══════════════════════════════════════════
//  PARTICLES
// ══════════════════════════════════════════
function updateParticles(dt) {
  for (let i = G.particles.length-1; i >= 0; i--) {
    const p = G.particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.88; p.vy += 0.3;
    p.life -= 0.024;
    if (p.life <= 0) G.particles.splice(i, 1);
  }
  for (let i = G.sparks.length-1; i >= 0; i--) {
    const s = G.sparks[i];
    s.x += s.vx; s.y += s.vy;
    s.life -= 0.04;
    if (s.life <= 0) G.sparks.splice(i, 1);
  }
  if (G.comboTimer > 0 && --G.comboTimer === 0) G.comboChain = 0;
}

// ══════════════════════════════════════════
//  DRAW
// ══════════════════════════════════════════
function draw() {
  ctx.fillStyle = '#0b0b12';
  ctx.fillRect(0, 0, W, H);

  drawBackground();
  drawScenery();
  drawRoad();
  drawSkids();
  drawRoadObjects();
  drawTraffic();
  drawParticlesD();
  drawPolice();
  drawPlayerCar();
  drawSpeedEffect();
}

// ── Background (full screen road look) ──
function drawBackground() {
  // Full-screen dark ground
  ctx.fillStyle = '#0e1018';
  ctx.fillRect(0, 0, W, H);

  // Subtle vanishing-point glow at the top center (sense of depth)
  const vp = ctx.createRadialGradient(W/2, H*0.08, 0, W/2, H*0.08, W*0.55);
  vp.addColorStop(0, 'rgba(255,140,30,0.10)');
  vp.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = vp;
  ctx.fillRect(0, 0, W, H * 0.35);
}

// ── Roadside scenery ──
function drawScenery() {
  for (const s of G.scenery) {
    ctx.save();
    ctx.translate(s.x, s.y);
    switch (s.type) {
      case 'tree':
        ctx.fillStyle = '#1a2a18'; ctx.fillRect(-4, -28, 8, 30);
        ctx.fillStyle = '#1e3d1a';
        ctx.beginPath(); ctx.moveTo(0,-50); ctx.lineTo(-18,-10); ctx.lineTo(18,-10); ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#254d20';
        ctx.beginPath(); ctx.moveTo(0,-70); ctx.lineTo(-13,-35); ctx.lineTo(13,-35); ctx.closePath(); ctx.fill();
        break;
      case 'bush':
        ctx.fillStyle = '#1e3015';
        ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#254020';
        ctx.beginPath(); ctx.arc(-8,-4,10,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(8,-4,10,0,Math.PI*2); ctx.fill();
        break;
      case 'billboard':
        ctx.fillStyle = '#222'; ctx.fillRect(-4,-60,8,62);
        ctx.fillStyle = '#111'; ctx.fillRect(-30,-70,60,28);
        ctx.fillStyle = Math.floor(s.x + s.y) % 2 === 0 ? '#FF0099' : '#F5C400';
        ctx.font = 'bold 9px Barlow Condensed, sans-serif';
        ctx.textAlign = 'center'; ctx.fillText('CHAOS', 0, -52);
        break;
      case 'light':
        ctx.fillStyle = '#333'; ctx.fillRect(-3,-70,6,72);
        ctx.fillStyle = '#FFEEAA'; ctx.shadowColor = '#FFEEAA'; ctx.shadowBlur = 18;
        ctx.beginPath(); ctx.arc(0,-70,6,0,Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
        break;
    }
    ctx.restore();
  }
}

// ── Road ──
function drawRoad() {
  const roadLeft = W/2 - ROAD_W/2;

  // Shoulder (gravel / dirt) — full height
  ctx.fillStyle = '#1a1c20';
  ctx.fillRect(0, 0, roadLeft, H);
  ctx.fillRect(roadLeft + ROAD_W, 0, W - (roadLeft + ROAD_W), H);

  // Crash barriers — full height
  const BAR = 8;
  for (let yy = -80; yy < H + 80; yy += 24) {
    const off = ((yy + G.roadMarkOffset * 0.8) % 24 + 24) % 24;
    const lit = off < 12;
    ctx.fillStyle = lit ? '#CC3300' : '#EEEEEE';
    ctx.fillRect(roadLeft - BAR, yy, BAR, 12);
    ctx.fillRect(roadLeft + ROAD_W, yy, BAR, 12);
  }

  // Road surface — full height
  ctx.fillStyle = '#1d1f2a';
  ctx.fillRect(roadLeft, 0, ROAD_W, H);

  // Lane dividers — full height
  for (let l = 1; l < NUM_LANES; l++) {
    const lx = roadLeft + l * LANE_W;
    const isSolid = l === NUM_LANES/2; // center divider solid
    ctx.strokeStyle = isSolid ? 'rgba(255,255,255,0.35)' : 'rgba(245,196,0,0.18)';
    ctx.lineWidth = isSolid ? 3 : 2;
    if (isSolid) {
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(lx, -10); ctx.lineTo(lx, H+10); ctx.stroke();
    } else {
      ctx.setLineDash([40, 40]);
      ctx.lineDashOffset = -G.roadMarkOffset;
      ctx.beginPath(); ctx.moveTo(lx, -10); ctx.lineTo(lx, H+10); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // Road outer lines — full height
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 3; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(roadLeft, -10); ctx.lineTo(roadLeft, H+10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(roadLeft+ROAD_W, -10); ctx.lineTo(roadLeft+ROAD_W, H+10); ctx.stroke();

  // Subtle top-of-screen depth fade
  const fade = ctx.createLinearGradient(0, 0, 0, H*0.12);
  fade.addColorStop(0, 'rgba(10,10,18,0.85)');
  fade.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = fade;
  ctx.fillRect(0, 0, W, H*0.12);
}

// ── Skid marks ──
function drawSkids() {
  ctx.save(); ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000';
  for (const s of G.skidLeft) { ctx.beginPath(); ctx.arc(s.x, s.y, 2.5, 0, Math.PI*2); ctx.fill(); }
  for (const s of G.skidRight) { ctx.beginPath(); ctx.arc(s.x, s.y, 2.5, 0, Math.PI*2); ctx.fill(); }
  ctx.restore();
}

// ── Road objects ──
function drawRoadObjects() {
  for (const o of G.roadObj) {
    if (!o.alive) continue;
    ctx.save(); ctx.translate(o.x, o.y);
    switch (o.type) {
      case 'barrel':
        ctx.fillStyle='#442200'; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#773300'; ctx.beginPath(); ctx.arc(0,0,6,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle='#996600'; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.stroke();
        break;
      case 'cone':
        ctx.fillStyle='#FF5500';
        ctx.beginPath(); ctx.moveTo(0,-14); ctx.lineTo(-10,8); ctx.lineTo(10,8); ctx.closePath(); ctx.fill();
        ctx.fillStyle='#fff'; ctx.fillRect(-10,0,20,4);
        break;
      case 'debris':
        ctx.fillStyle='#555';
        for(let i=0;i<4;i++) ctx.fillRect(-8+i*4,-5,6,6);
        break;
      case 'crate':
        ctx.fillStyle='#885522'; ctx.fillRect(-11,-11,22,22);
        ctx.strokeStyle='#553311'; ctx.lineWidth=2;
        ctx.strokeRect(-11,-11,22,22);
        ctx.beginPath(); ctx.moveTo(-11,-11); ctx.lineTo(11,11); ctx.moveTo(11,-11); ctx.lineTo(-11,11); ctx.stroke();
        break;
    }
    ctx.restore();
  }
}

// ── Traffic cars ──
function drawTraffic() {
  for (const t of G.traffic) {
    if (!t.alive) continue;
    drawVehicle(ctx, t.x, t.y, t.w, t.h, t.col, t.type, false);
  }
}

function drawVehicle(c, x, y, w, h, col, type, isPlayer) {
  c.save(); c.translate(x, y);

  // Body
  c.fillStyle = col;
  c.fillRect(-w/2, -h/2, w, h);

  // Roof
  c.fillStyle = darken(col, 0.7);
  c.fillRect(-w/2+4, -h/2+6, w-8, h*0.45);

  // Windows
  c.fillStyle = isPlayer ? '#88DDFF' : 'rgba(100,180,220,0.6)';
  c.fillRect(-w/2+4, -h/2+8, w-8, h*0.18);
  c.fillRect(-w/2+4, h*0.08, w-8, h*0.18);

  // Headlights (top of sprite = front of car coming toward us)
  if (!isPlayer) {
    c.fillStyle = '#FFEEAA';
    c.fillRect(-w/2+3, -h/2+1, 5, 3);
    c.fillRect(w/2-8, -h/2+1, 5, 3);
    // Tail lights at bottom
    c.fillStyle = '#FF2200';
    c.shadowColor = '#FF0000'; c.shadowBlur = 6;
    c.fillRect(-w/2+3, h/2-4, 5, 3);
    c.fillRect(w/2-8, h/2-4, 5, 3);
    c.shadowBlur = 0;
  } else {
    // Player: headlights at top
    c.fillStyle = '#FFFF88'; c.shadowColor='#FFFF00'; c.shadowBlur=10;
    c.fillRect(-w/2+2, -h/2+1, 5, 4); c.fillRect(w/2-7,-h/2+1,5,4);
    c.shadowBlur=0;
    // Tail lights glow
    c.fillStyle='#FF2200'; c.shadowColor='#FF0000'; c.shadowBlur=12;
    c.fillRect(-w/2+2, h/2-5, 5, 4); c.fillRect(w/2-7,h/2-5,5,4);
    c.shadowBlur=0;
  }

  // Wheels
  c.fillStyle = '#111';
  c.fillRect(-w/2-3, -h/3, 4, 10);
  c.fillRect(w/2-1, -h/3, 4, 10);
  c.fillRect(-w/2-3, h/3-8, 4, 10);
  c.fillRect(w/2-1, h/3-8, 4, 10);

  // Boost flame
  if (isPlayer && G.boostActive) {
    c.shadowColor='#FF5500'; c.shadowBlur=20;
    c.fillStyle='#FF6600';
    c.beginPath(); c.moveTo(-8,h/2); c.lineTo(8,h/2); c.lineTo(4,h/2+16+Math.random()*12); c.lineTo(0,h/2+22+Math.random()*10); c.lineTo(-4,h/2+16+Math.random()*12); c.closePath(); c.fill();
    c.fillStyle='#FFDD00';
    c.beginPath(); c.moveTo(-4,h/2); c.lineTo(4,h/2); c.lineTo(0,h/2+12+Math.random()*6); c.closePath(); c.fill();
    c.shadowBlur=0;
  }
  c.restore();
}

function darken(hex, f) {
  // rough darken
  try {
    const r=parseInt(hex.slice(1,3),16)*f|0;
    const g=parseInt(hex.slice(3,5),16)*f|0;
    const b=parseInt(hex.slice(5,7),16)*f|0;
    return `rgb(${r},${g},${b})`;
  } catch(e){ return '#333'; }
}

// ── Police cars ──
function drawPolice() {
  for (const p of G.police) {
    const fl = Math.sin(p.siren * 6) > 0;
    ctx.save(); ctx.translate(p.x, p.y);

    ctx.fillStyle = '#002299'; ctx.fillRect(-15,-27,30,54);
    ctx.fillStyle = '#446688'; ctx.fillRect(-13,-21,26,16);ctx.fillRect(-13,6,26,16);
    // Siren bar
    ctx.fillStyle = fl ? '#FF2200' : '#001166'; ctx.fillRect(-12,-30,12,7);
    ctx.fillStyle = fl ? '#0022FF' : '#880000'; ctx.fillRect(0,-30,12,7);
    if (fl) { ctx.shadowColor='#FF0000'; ctx.shadowBlur=16; ctx.fillStyle='rgba(255,0,0,0.15)'; ctx.beginPath(); ctx.arc(0,0,40,0,Math.PI*2); ctx.fill(); }
    ctx.shadowBlur=0;
    // Wheels
    ctx.fillStyle='#111';
    ctx.fillRect(-18,-17,4,10);ctx.fillRect(14,-17,4,10);ctx.fillRect(-18,9,4,10);ctx.fillRect(14,9,4,10);
    // "POLICE" stripe
    ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.fillRect(-15,-2,30,5);
    ctx.restore();
  }
}

// ── Particles ──
function drawParticlesD() {
  ctx.save();
  for (const p of G.particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * p.life, 0, Math.PI*2); ctx.fill();
  }
  for (const s of G.sparks) {
    ctx.globalAlpha = s.life;
    ctx.fillStyle = s.col;
    ctx.beginPath(); ctx.arc(s.x, s.y, 4*s.life, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ── Player car ──
function drawPlayerCar() {
  const c = G.car;
  drawVehicle(ctx, c.x, c.y, c.w, c.h, '#CC1100', 'player', true);
  // Invincibility flash
  if (c.inv > 0 && Math.floor(Date.now()/80)%2) {
    ctx.save(); ctx.globalAlpha=0.4; ctx.fillStyle='#FFFF00';
    ctx.fillRect(c.x-c.w/2, c.y-c.h/2, c.w, c.h);
    ctx.restore();
  }
}

// ── Speed line overlay ──
function drawSpeedEffect() {
  if (!G.boostActive && G.car.speed < 7) return;
  const alpha = G.boostActive ? 0.18 : 0.08;
  ctx.save(); ctx.globalAlpha = alpha; ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 1;
  for (let i = 0; i < 16; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const len = 30 + Math.random() * 80;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + len); ctx.stroke();
  }
  ctx.restore();
}

// ══════════════════════════════════════════
//  HUD UPDATE
// ══════════════════════════════════════════
function updateHUD() {
  document.getElementById('hScore').textContent = G.score.toLocaleString();
  document.getElementById('hDist').textContent = (G.dist|0) + ' m';
  document.getElementById('hSpeed').textContent = (G.car.speed * 20) | 0;
  const pct = G.boost / G.maxBoost * 100;
  document.getElementById('boostFill').style.width = pct + '%';
  document.getElementById('boostFill').classList.toggle('lit', pct >= 95);
  for (let i = 1; i <= 5; i++) document.getElementById('s'+i).classList.toggle('on', i <= G.wanted);
}

function flashMsg(txt, col) {
  const el = document.getElementById('combo');
  el.textContent = txt; el.style.color = col || '#F5C400';
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
}

// ══════════════════════════════════════════
//  END GAME
// ══════════════════════════════════════════
function endGame(won) {
  G.running = false; stopEngine();
  won ? playFinish() : playBusted();
  const el = document.getElementById('gameover');
  const h = document.getElementById('goH');
  h.textContent = won ? 'FINISH!' : 'BUSTED!';
  h.style.color = won ? '#F5C400' : '#FF1111';
  h.style.textShadow = won ? '0 0 40px #F5C400' : '0 0 40px #FF1111';
  document.getElementById('goPt').textContent = G.score.toLocaleString() + ' PTS';
  document.getElementById('goSt').innerHTML =
    `Distance: <b>${G.dist|0} m</b> &nbsp;·&nbsp; Destroyed: <b>${G.destroyed}</b><br>` +
    `Combos: <b>${G.combos}</b> &nbsp;·&nbsp; Wanted: <b>${'★'.repeat(G.wanted)||'—'}</b>`;
  el.classList.add('show');
}

// ══════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 16.67, 3); last = ts;
  requestAnimationFrame(loop);
  if (!G || !G.running || G.paused) return;
  update(dt);
  draw();
  updateHUD();
}
requestAnimationFrame(loop);

// ══════════════════════════════════════════
//  BUTTONS
// ══════════════════════════════════════════
function startGame() {
  initAudio(); resumeAC();
  document.getElementById('title').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('esc').style.display = 'block';
  document.getElementById('gameover').classList.remove('show');
  document.getElementById('pause').classList.remove('show');
  // Show mobile controls if mobile mode selected
  const mc = document.getElementById('mctrl');
  if (mobileMode) mc.classList.add('show'); else mc.classList.remove('show');
  G = mkGame();
  G.car.x = laneX(G.car.lane);
  startEngine();
}

function goTitle() {
  stopEngine(); G = null;
  document.getElementById('gameover').classList.remove('show');
  document.getElementById('pause').classList.remove('show');
  document.getElementById('hud').style.display = 'none';
  document.getElementById('esc').style.display = 'none';
  document.getElementById('mctrl').classList.remove('show');
  document.getElementById('title').style.display = 'flex';
}

document.getElementById('btnStart').addEventListener('click', () => { playClick(); startGame(); });
document.getElementById('btnResume').addEventListener('click', togglePause);
document.getElementById('btnQuit').addEventListener('click', () => { playClick(); goTitle(); });
document.getElementById('btnRestart').addEventListener('click', () => { playClick(); startGame(); });
document.getElementById('btnMenu').addEventListener('click', () => { playClick(); goTitle(); });

// ── Control mode toggle ──
let mobileMode = false;

function setControlMode(mobile) {
  mobileMode = mobile;
  document.getElementById('optPC').classList.toggle('active', !mobile);
  document.getElementById('optMobile').classList.toggle('active', mobile);
  document.getElementById('tkeys').style.display = mobile ? 'none' : 'block';
}

document.getElementById('optPC').addEventListener('click', () => { playClick(); setControlMode(false); });
document.getElementById('optMobile').addEventListener('click', () => { playClick(); setControlMode(true); });

// ── Mobile button wiring ──
function mcBind(id, code) {
  const el = document.getElementById(id);
  function on(e) { e.preventDefault(); K[code] = true; el.classList.add('held'); }
  function off(e) { e.preventDefault(); K[code] = false; el.classList.remove('held'); }
  el.addEventListener('touchstart', on, { passive: false });
  el.addEventListener('touchend', off, { passive: false });
  el.addEventListener('touchcancel', off, { passive: false });
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup', off);
  el.addEventListener('mouseleave', off);
}
mcBind('mcLeft',  'ArrowLeft');
mcBind('mcRight', 'ArrowRight');
mcBind('mcUp',    'ArrowUp');
mcBind('mcDown',  'ArrowDown');
mcBind('mcBoost', 'Space');

const volEl = document.getElementById('vol');
volEl.addEventListener('input', () => {
  volMult = volEl.value / 100;
  document.getElementById('volN').textContent = volEl.value + '%';
  if (MG) MG.gain.value = volMult;
});
</script>
